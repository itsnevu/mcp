server {
    listen 443 ssl http2;
    server_name bugglo.example.com;          # <- your domain

    ssl_certificate     /etc/letsencrypt/live/bugglo.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bugglo.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # LOAD-BEARING for the spend guard, not boilerplate.
        #
        # $proxy_add_x_forwarded_for APPENDS the address nginx actually observed to whatever
        # the client sent. So the RIGHTMOST entry is real and the left end is the client's
        # own fiction — which is precisely what lib/rateLimit.js counts on: clientIpFrom()
        # walks in from the right by ENGINE_TRUSTED_PROXIES hops (1 = this nginx).
        #
        # Write `proxy_set_header X-Forwarded-For $remote_addr;` instead and you are fine too.
        # Write nothing, or forward the client's header verbatim, and every attacker rotates
        # their own IP bucket per request and the per-IP caps stop existing.
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP         $remote_addr;

        # An agentic answer is several model turns with MCP tool calls between them. A real
        # on-chain question measured 38s end to end, and the app's own hard deadline is 75s
        # (CHAT_HARD_DEADLINE_MS). nginx defaults to 60s and would cut the reply off after
        # the tokens were already paid for — so give it more room than the app needs, and
        # let the APP be the thing that decides when to give up.
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_connect_timeout 10s;

        proxy_buffering off;   # stream the reply out instead of holding it whole
    }
}

server {
    listen 80;
    server_name bugglo.example.com;
    return 301 https://$host$request_uri;
}
